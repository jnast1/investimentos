name: Atualizar indices do BCB

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Buscar series no BCB
        run: python3 scripts/busca_indices.py

      - name: Publicar indices.json
        run: |
          git config user.name "robo-indices"
          git config user.email "actions@users.noreply.github.com"
          git add indices.json
          git diff --cached --quiet || git commit -m "Atualiza indices"
          git pull --rebase --autostash
          git push
